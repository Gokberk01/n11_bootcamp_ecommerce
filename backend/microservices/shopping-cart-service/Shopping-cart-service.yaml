openapi: 3.1.0
info:
  title: Shopping Card Service API
  description: "API documentation for the Shopping Cart Microservice, including operations\
    \ for managing user carts, adding products, and calculating total prices."
  version: 1.0.0
servers:
- url: http://localhost:8765
  description: Generated server url
tags:
- name: Shopping Cart
  description: Shopping Cart Management APIs
paths:
  /api/shopping-cart:
    post:
      tags:
      - Shopping Cart
      summary: Create a new shopping cart
      description: Initializes a new shopping cart for a user with the given name.
      operationId: createShoppingCart
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ShoppingCart"
  /api/shopping-cart/{shoppingCartId}:
    post:
      tags:
      - Shopping Cart
      summary: Add products to shopping cart
      description: Adds a list of products to an existing shopping cart.
      operationId: addProductsToShoppingCart
      parameters:
      - name: shoppingCartId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/Product"
        required: true
      responses:
        "200":
          description: Products successfully added
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ShoppingCart"
        "404":
          description: Shopping cart not found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ShoppingCart"
  /api/shopping-cart/{id}:
    get:
      tags:
      - Shopping Cart
      summary: Get shopping cart by ID
      operationId: getShoppingCartById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ShoppingCart"
    delete:
      tags:
      - Shopping Cart
      summary: Delete shopping cart by ID
      operationId: deleteShoppingCartById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
  /api/shopping-cart/totalprice/{id}:
    get:
      tags:
      - Shopping Cart
      summary: Calculate total price
      description: Returns the total price of all items in the specified shopping
        cart.
      operationId: getTotalPrice
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties:
                  type: string
  /api/shopping-cart/by-name/{name}:
    get:
      tags:
      - Shopping Cart
      summary: Get shopping cart by name
      operationId: getShoppingCartByShoppingCartName
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ShoppingCart"
  /api/shopping-cart/{shoppingCartId}/products/{productId}:
    delete:
      tags:
      - Shopping Cart
      summary: Remove a product from shopping cart
      operationId: removeProductFromShoppingCart
      parameters:
      - name: shoppingCartId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: productId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ShoppingCart"
  /api/shopping-cart/deleteAll:
    delete:
      tags:
      - Shopping Cart
      summary: Delete ALL shopping carts
      description: "Danger: This will clear all shopping carts in the system."
      operationId: deleteAllShoppingCarts
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: string
components:
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        img:
          type: string
        brand:
          type: string
        price:
          type: integer
          format: int64
        category:
          type: string
        categoryKey:
          type: string
    ShoppingCart:
      type: object
      properties:
        id:
          type: integer
          format: int64
        shoppingCartName:
          type: string
        products:
          type: array
          items:
            $ref: "#/components/schemas/Product"
          uniqueItems: true
