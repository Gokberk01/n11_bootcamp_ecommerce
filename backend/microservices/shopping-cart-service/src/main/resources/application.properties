spring.application.name=shopping-cart-service
server.port=8765

#spring.config.import=optional:configserver:${CONFIG_URI:http://localhost:8762}
spring.config.import=optional:configserver:${CONFIG_URI:http://config-server:8762}

eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:postgresql://postgres-db:5432/n11bootcampecommerce
spring.datasource.username=postgres
spring.datasource.password=1234
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false