# Eureka Server
eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Spring Cloud Gateway
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedOrigins=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowedHeaders=*

# Gateway Routes
spring.cloud.gateway.server.webmvc.routes[0].id=PRODUCT-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/product/**

spring.cloud.gateway.server.webmvc.routes[1].id=SHOPPING-CART-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://SHOPPING-CART-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/shopping-cart/**

spring.cloud.gateway.server.webmvc.routes[2].id=USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/user/**

spring.cloud.gateway.server.webmvc.routes[3].id=STOCK-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://STOCK-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/stocks/**

spring.cloud.gateway.server.webmvc.routes[4].id=ORDER-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://ORDER-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.server.webmvc.routes[5].id=PAYMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/api/payment/**