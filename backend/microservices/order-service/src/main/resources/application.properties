spring.application.name=order-service
server.port=8768

#spring.config.import=optional:configserver:${CONFIG_URI:http://localhost:8762}
spring.config.import=optional:configserver:${CONFIG_URI:http://config-server:8762}

eureka.client.service-url.defaultZone=http://discovery-server:8761/eureka
eureka.instance.prefer-ip-address=true

spring.datasource.url=jdbc:postgresql://postgres-db:5432/n11bootcampecommerce
spring.datasource.username=postgres
spring.datasource.password=1234
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# === RABBITMQ ===
#spring.rabbitmq.host=localhost
spring.rabbitmq.host=rabbitmq
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.template.mandatory=true


# topology
rabbitmq.exchange=orders.exchange
rabbitmq.queue=order.created.queue
rabbitmq.routingkey=order.created


# === SAGA / STOCK EXCHANGE & ORDER QUEUE AYARLARI ===
stock.rabbit.exchange=stock.events.exchange
stock.rabbit.reservedRoutingKey=order.stock.reserved
stock.rabbit.rejectedRoutingKey=order.stock.rejected

order.rabbit.stockReservedQueue=order.stock.reserved.queue
order.rabbit.stockRejectedQueue=order.stock.rejected.queue


stock.rabbit.reserveRequestedRoutingKey=order.stock.reserve.requested

